<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Аяулым!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alice&family=Montserrat:wght@400;600;700&display=swap');
        
        :root {
            --bg-speed: 15s;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Живой переливающийся фон */
            background: linear-gradient(-45deg, #fff1f2, #ffe4e6, #fecdd3, #ffd1dc);
            background-size: 400% 400%;
            animation: gradientBG var(--bg-speed) ease infinite;
            color: #881337;
            touch-action: manipulation;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .holiday-font {
            font-family: 'Alice', serif;
        }

        /* Плитки */
        .tile {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(136, 19, 55, 0.1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .tile:hover:not(.empty) {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 20px -5px rgba(225, 29, 72, 0.2);
            z-index: 10;
        }

        .tile.selected {
            transform: scale(1.1);
            outline: 3px solid #fb7185;
            box-shadow: 0 0 15px rgba(251, 113, 133, 0.6);
        }

        .tile.hint-highlight {
            animation: pulse-heart 0.5s infinite alternate;
            outline: 3px solid #f43f5e;
        }

        @keyframes pulse-heart {
            from { transform: scale(1); box-shadow: 0 0 5px #f43f5e; }
            to { transform: scale(1.1); box-shadow: 0 0 25px #f43f5e; }
        }

        .tile.empty {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.3);
        }

        .line-canvas {
            pointer-events: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 50;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(136, 19, 55, 0.08);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Декорации */
        .decor-item {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            user-select: none;
        }

        .floating {
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -25px) rotate(15deg); }
            66% { transform: translate(-10px, 20px) rotate(-15deg); }
        }

        /* Падающие лепестки */
        .petal {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: -1;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); left: var(--start-x); }
            100% { transform: translateY(110vh) rotate(360deg); left: var(--end-x); }
        }

        #game-board-container {
            max-height: 65vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body class="py-2 px-2">

    <!-- Фоновые цветы -->
    <div class="decor-item floating text-6xl top-10 left-[5%]" style="animation-duration: 12s">🌸</div>
    <div class="decor-item floating text-5xl top-1/4 right-[5%]" style="animation-delay: -2s; animation-duration: 15s">🌷</div>
    <div class="decor-item floating text-4xl bottom-10 left-[10%]" style="animation-delay: -5s; animation-duration: 18s">🌺</div>
    <div class="decor-item floating text-5xl bottom-1/4 right-[10%]" style="animation-delay: -7s; animation-duration: 14s">🌼</div>
    <div class="decor-item floating text-3xl top-1/2 left-[2%]" style="animation-duration: 20s">🌹</div>

    <!-- Контейнер для лепестков (создаются через JS) -->
    <div id="petals-container"></div>

    <div class="w-full max-w-2xl text-center z-10 flex flex-col items-center">
        <h1 class="text-3xl md:text-4xl holiday-font mb-2 text-rose-600 tracking-wide drop-shadow-md animate-bounce" style="animation-duration: 3s">
            С 8 Марта, Аяулым! ❤️
        </h1>
        
        <!-- Инфо-панель -->
        <div class="glass-panel p-3 mb-3 w-full max-w-sm">
            <div class="flex justify-between items-center mb-1 px-2">
                <div class="flex flex-col items-start leading-none">
                    <span class="text-[10px] uppercase font-bold text-rose-400">Уровень</span>
                    <span id="level-display" class="text-xl font-bold text-rose-700">1</span>
                </div>
                <div id="antistress-label" class="hidden text-rose-500 font-bold holiday-font text-base animate-pulse">Anti-Stress 🌸</div>
                <div class="flex flex-col items-end leading-none">
                    <span class="text-[10px] uppercase font-bold text-rose-400">Таймер</span>
                    <span id="timer-text" class="text-xl font-bold text-rose-800 tracking-tight">02:00</span>
                </div>
            </div>
            <div class="w-full bg-white/40 h-2 rounded-full overflow-hidden border border-rose-100/50">
                <div id="timer-bar" class="h-full bg-gradient-to-r from-rose-400 via-rose-500 to-rose-600 w-full transition-all duration-1000 shadow-lg"></div>
            </div>
        </div>

        <div id="game-board-container" class="relative">
            <div class="glass-panel p-3 shadow-2xl inline-block bg-white/30">
                <div id="game-board" class="grid transition-all duration-500 overflow-hidden"></div>
                <canvas id="line-canvas" class="line-canvas"></canvas>
            </div>
        </div>

        <div class="mt-4 flex flex-wrap justify-center gap-3">
            <button id="hint-btn" class="bg-white/80 hover:bg-white text-rose-600 px-5 py-2 rounded-full shadow-lg transition transform active:scale-90 font-bold uppercase tracking-wider text-xs flex items-center gap-2 border border-rose-200">
                <span class="text-lg">💝</span> Подсказка (<span id="hints-count">3</span>)
            </button>
            <button id="shuffle-btn" class="bg-rose-50 hover:bg-rose-100 text-rose-700 px-5 py-2 rounded-full shadow-lg transition transform active:scale-95 font-bold uppercase tracking-wider text-xs flex items-center gap-2 border border-rose-200">
                <span>🔄</span> Микс
            </button>
            <button id="restart-btn" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-full shadow-xl transition transform active:scale-95 font-bold uppercase tracking-wider text-xs">
                Заново
            </button>
        </div>
    </div>

    <!-- Модалки -->
    <div id="win-modal" class="fixed inset-0 bg-rose-900/40 backdrop-blur-xl flex items-center justify-center z-[100] hidden p-6 text-center">
        <div class="bg-white p-8 md:p-10 rounded-[40px] shadow-2xl max-w-md border-t-8 border-rose-400 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 text-6xl opacity-20">🌸</div>
            <div id="win-icon" class="text-7xl mb-4">✨</div>
            <h2 id="win-title" class="text-3xl holiday-font text-rose-600 mb-4 font-bold">Круто!</h2>
            <p id="win-message" class="text-rose-800 text-xl holiday-font mb-8 px-4"></p>
            <button id="next-btn" class="bg-rose-500 hover:bg-rose-600 text-white px-12 py-4 rounded-full font-bold text-xl shadow-xl transition transform active:scale-95 w-full">Дальше ❤️</button>
        </div>
    </div>

    <div id="lose-modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-[100] hidden p-6">
        <div class="bg-white p-8 rounded-[30px] text-center max-w-xs shadow-2xl border-t-8 border-slate-400">
            <div class="text-5xl mb-4">⌛</div>
            <h2 class="text-2xl font-bold text-rose-600 mb-4 holiday-font">Время вышло</h2>
            <button onclick="location.reload()" class="bg-rose-500 text-white px-10 py-3 rounded-full font-bold shadow-lg transition w-full">Повторить ✨</button>
        </div>
    </div>

    <script>
        const PHOTO_PATHS = [
            'photos/1.jpeg', 'photos/2.jpeg', 'photos/3.jpeg', 'photos/4.jpeg',
            'photos/5.jpeg', 'photos/6.jpeg', 'photos/7.jpeg', 'photos/8.jpeg',
            'photos/9.jpeg', 'photos/10.jpeg', 'photos/11.jpeg', 'photos/12.jpeg',
            'photos/13.jpeg', 'photos/14.jpeg', 'photos/15.jpeg', 'photos/16.jpeg',
            'photos/17.jpeg', 'photos/18.jpeg'
        ];

        const boardElement = document.getElementById('game-board');
        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');
        const winModal = document.getElementById('win-modal');
        const nextBtn = document.getElementById('next-btn');
        const levelDisplay = document.getElementById('level-display');

        let currentLevel = 1;
        let ROWS, COLS, board = [], selected = null, customImages = [...PHOTO_PATHS];
        let isProcessing = false, gameActive = false, timeTotal = 120, timeRemaining = 120, timerId = null, hintsLeft = 3;

        const defaultIcons = ['🌸', '🌷', '🌹', '🌺', '🌻', '🌼', '🐣', '🦋', '🎈', '🍓', '🍰', '💎'];

        // Функция создания падающих лепестков
        function createPetals() {
            const container = document.getElementById('petals-container');
            const petalCount = 15;
            for(let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = ['🌸', '💗', '✨'][Math.floor(Math.random() * 3)];
                petal.style.fontSize = Math.random() * 20 + 10 + 'px';
                petal.style.setProperty('--start-x', Math.random() * 100 + 'vw');
                petal.style.setProperty('--end-x', (Math.random() * 100 - 10) + 'vw');
                petal.style.animationDuration = Math.random() * 10 + 10 + 's';
                petal.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(petal);
            }
        }

        function initGame() {
            if (currentLevel === 1) { ROWS = 4; COLS = 4; timeTotal = 120; }
            else if (currentLevel === 2) { ROWS = 4; COLS = 4; timeTotal = 60; }
            else if (currentLevel === 3) { ROWS = 6; COLS = 6; timeTotal = 180; }
            else { ROWS = 8; COLS = 8; timeTotal = 300; document.getElementById('antistress-label').classList.remove('hidden'); }

            hintsLeft = 3;
            document.getElementById('hints-count').textContent = hintsLeft;
            levelDisplay.textContent = currentLevel;
            board = []; selected = null; gameActive = true; isProcessing = false;
            
            let pool = [];
            const pairsNeeded = (ROWS * COLS) / 2;
            const source = customImages.length >= 6 ? customImages : defaultIcons;
            for (let i = 0; i < pairsNeeded; i++) pool.push(source[i % source.length], source[i % source.length]);
            pool.sort(() => Math.random() - 0.5);

            for (let r = 0; r < ROWS + 2; r++) {
                board[r] = [];
                for (let c = 0; c < COLS + 2; c++) {
                    board[r][c] = (r === 0 || r === ROWS + 1 || c === 0 || c === COLS + 1) ? null : pool.pop();
                }
            }
            ensurePossibleMoves(); renderBoard(); startTimer();
        }

        function ensurePossibleMoves() {
            let attempts = 0;
            while (!checkAnyPossibleMove() && attempts < 50) {
                let tiles = [];
                for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (board[r][c]) tiles.push(board[r][c]);
                tiles.sort(() => Math.random() - 0.5);
                for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (board[r][c]) board[r][c] = tiles.pop();
                attempts++;
            }
        }

        function checkAnyPossibleMove() {
            const tilesPos = [];
            for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (board[r][c]) tilesPos.push({r, c, val: board[r][c]});
            for (let i = 0; i < tilesPos.length; i++) {
                for (let j = i + 1; j < tilesPos.length; j++) {
                    if (tilesPos[i].val === tilesPos[j].val && findPath(tilesPos[i].r, tilesPos[i].c, tilesPos[j].r, tilesPos[j].c)) return {t1: tilesPos[i], t2: tilesPos[j]};
                }
            }
            return false;
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            const gap = currentLevel >= 3 ? 4 : 6;
            const availableWidth = window.innerWidth * 0.85; 
            const availableHeight = window.innerHeight * 0.58; 
            
            const maxTileSize = Math.floor(Math.min(
                (availableWidth - (COLS - 1) * gap) / COLS,
                (availableHeight - (ROWS - 1) * gap) / ROWS
            ));

            boardElement.style.gridTemplateColumns = `repeat(${COLS}, ${maxTileSize}px)`;
            boardElement.style.gap = `${gap}px`;
            
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const tile = document.createElement('div');
                    tile.dataset.r = r; tile.dataset.c = c;
                    tile.className = `tile`;
                    tile.style.width = `${maxTileSize}px`;
                    tile.style.height = `${maxTileSize}px`;

                    if (board[r][c] === null) tile.classList.add('empty');
                    else {
                        const content = board[r][c];
                        if (content.includes('/') || content.startsWith('data:image')) {
                            const img = document.createElement('img');
                            img.src = content; img.className = 'w-full h-full object-cover rounded-sm';
                            tile.appendChild(img);
                        } else {
                            tile.textContent = content; 
                            tile.style.fontSize = `${maxTileSize * 0.5}px`;
                        }
                        tile.onclick = () => handleTileClick(r, c, tile);
                    }
                    boardElement.appendChild(tile);
                }
            }
            resizeCanvas();
        }

        function startTimer() {
            clearInterval(timerId);
            timeRemaining = timeTotal;
            updateTimerUI();
            timerId = setInterval(() => {
                if (!gameActive) return;
                timeRemaining--; updateTimerUI();
                if (timeRemaining <= 0) { gameActive = false; clearInterval(timerId); document.getElementById('lose-modal').classList.remove('hidden'); }
            }, 1000);
        }

        function updateTimerUI() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            timerText.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            timerBar.style.width = `${(timeRemaining / timeTotal) * 100}%`;
        }

        function handleTileClick(r, c, el) {
            if (isProcessing || !gameActive || board[r][c] === null) return;
            if (selected) {
                if (selected.r === r && selected.c === c) { el.classList.remove('selected'); selected = null; return; }
                if (board[r][c] === board[selected.r][selected.c]) {
                    const path = findPath(selected.r, selected.c, r, c);
                    if (path) {
                        drawConnectLine(path); isProcessing = true;
                        setTimeout(() => {
                            board[r][c] = null; board[selected.r][selected.c] = null;
                            selected = null; isProcessing = false; clearCanvas(); 
                            if (checkWin()) handleWin(); else { ensurePossibleMoves(); renderBoard(); }
                        }, 400); return;
                    }
                }
                document.querySelector(`[data-r="${selected.r}"][data-c="${selected.c}"]`)?.classList.remove('selected');
                selected = { r, c }; el.classList.add('selected');
            } else { selected = { r, c }; el.classList.add('selected'); }
        }

        function findPath(r1, c1, r2, c2) {
            const queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [{r: r1, c: c1}]}];
            const visited = new Map();
            while (queue.length > 0) {
                const cur = queue.shift();
                if (cur.r === r2 && cur.c === c2) return cur.path;
                const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
                for (let i = 0; i < 4; i++) {
                    const nr = cur.r + dirs[i][0], nc = cur.c + dirs[i][1];
                    const nTurns = (cur.dir !== -1 && cur.dir !== i) ? cur.turns + 1 : cur.turns;
                    if (nTurns > 2 || nr < 0 || nr >= ROWS + 2 || nc < 0 || nc >= COLS + 2) continue;
                    if (board[nr][nc] === null || (nr === r2 && nc === c2)) {
                        const key = `${nr},${nc},${i},${nTurns}`;
                        if (!visited.has(key) || visited.get(key) > nTurns) { visited.set(key, nTurns); queue.push({ r: nr, c: nc, dir: i, turns: nTurns, path: [...cur.path, {r: nr, c: nc}] }); }
                    }
                }
            }
            return null;
        }

        function handleWin() {
            gameActive = false; clearInterval(timerId);
            winModal.classList.remove('hidden');
            const winTitle = document.getElementById('win-title'), winMsg = document.getElementById('win-message'), winIcon = document.getElementById('win-icon');
            if (currentLevel === 1) { winIcon.textContent = "⭐️"; winTitle.textContent = "Уровень 1"; winMsg.textContent = "Молодец, Аяулым! Давай дальше ✨"; nextBtn.onclick = () => { winModal.classList.add('hidden'); currentLevel = 2; initGame(); }; }
            else if (currentLevel === 2) { winIcon.textContent = "🚀"; winTitle.textContent = "Уровень 2"; winMsg.textContent = "СИИИГМА! Еще один раунд! ❤️"; nextBtn.onclick = () => { winModal.classList.add('hidden'); currentLevel = 3; initGame(); }; }
            else if (currentLevel === 3) { winIcon.textContent = "💐"; winTitle.textContent = "С Праздником!"; winMsg.textContent = "Дорогая Аяулым, поздравляю тебя с 8 марта и желаю тебе всего самого наилучшего. Спасибо за то что ты есть ❤️"; nextBtn.textContent = "Секретный уровень 🤫"; nextBtn.onclick = () => { winModal.classList.add('hidden'); currentLevel = 4; initGame(); }; }
            else { winIcon.textContent = "👑"; winTitle.textContent = "Антистресс Мастер!"; winMsg.textContent = "Ты прошла всё! Ты просто чудо. 🎉"; nextBtn.textContent = "Заново"; nextBtn.onclick = () => location.reload(); }
        }

        function drawConnectLine(path) {
            resizeCanvas(); ctx.beginPath(); ctx.strokeStyle = '#fb7185'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            path.forEach((p, i) => { const {x, y} = getCellCenter(p.c, p.r); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
            ctx.stroke();
        }

        function getCellCenter(c, r) { const rect = boardElement.getBoundingClientRect(); const cellW = rect.width / COLS; const cellH = rect.height / ROWS; return { x: (c - 0.5) * cellW, y: (r - 0.5) * cellH }; }
        function resizeCanvas() { const rect = boardElement.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function checkWin() { return !board.some(row => row.some(cell => cell !== null)); }

        document.getElementById('hint-btn').onclick = () => {
            const move = checkAnyPossibleMove();
            if (move && hintsLeft > 0) { hintsLeft--; document.getElementById('hints-count').textContent = hintsLeft; const el1 = document.querySelector(`[data-r="${move.t1.r}"][data-c="${move.t1.c}"]`), el2 = document.querySelector(`[data-r="${move.t2.r}"][data-c="${move.t2.c}"]`); el1.classList.add('hint-highlight'); el2.classList.add('hint-highlight'); setTimeout(() => { el1.classList.remove('hint-highlight'); el2.classList.remove('hint-highlight'); }, 1500); }
        };

        document.getElementById('shuffle-btn').onclick = () => {
            let tiles = []; for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (board[r][c]) tiles.push(board[r][c]);
            tiles.sort(() => Math.random() - 0.5); for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (board[r][c]) board[r][c] = tiles.pop();
            ensurePossibleMoves(); renderBoard();
        };

        document.getElementById('restart-btn').onclick = () => { currentLevel = 1; initGame(); };
        window.onresize = renderBoard;
        
        // Запуск лепестков и игры
        createPetals();
        initGame();
    </script>
</body>
</html>
